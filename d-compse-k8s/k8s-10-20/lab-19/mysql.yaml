apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ivolve
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ivolve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      tolerations:
        - key: "node"
          operator: "Equal"
          value: "worker"
          effect: "NoSchedule"

      containers:
        - name: mysql
          image: mysql:5.7

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root

          ports:
            - containerPort: 3306