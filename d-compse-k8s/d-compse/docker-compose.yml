services:
  app:
    build: ./kubernets-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root123
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=ivolve   
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
